volumes:
  mssql_data:

networks:
  theblog-network:
    driver: bridge

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2025-latest
    restart: always
    environment:
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: YourSecretPassword123!
      MSSQL_PID: Developer
    volumes:
      - mssql_data:/var/opt/mssql
    networks:
      - theblog-network
    healthcheck:
      test:
        - "CMD-SHELL"
        - "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourSecretPassword123!' -Q 'SELECT 1' -C || exit 1"
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - 1433:1433

  api:
    build:
      context: .
      dockerfile: src/TheBlog.API/Dockerfile
    ports:
      - 5000:8080
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__SqlServer: Server=mssql,1433;Database=YourDatabaseName;User Id=sa;Password=YourSecretPassword123!;TrustServerCertificate=True;
    networks:
      - theblog-network
